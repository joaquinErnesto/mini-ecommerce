<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Electric Noir</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#2c2c2c",
                    "secondary-container": "#705d00",
                    "on-tertiary-fixed-variant": "#5b3b00",
                    "on-secondary": "#594a00",
                    "on-error-container": "#ffa8a3",
                    "background": "#0e0e0e",
                    "tertiary-container": "#feaa00",
                    "error-container": "#9f0519",
                    "tertiary": "#ffbd5c",
                    "on-secondary-fixed-variant": "#645300",
                    "tertiary-dim": "#ec9e00",
                    "on-background": "#ffffff",
                    "error-dim": "#d7383b",
                    "tertiary-fixed": "#feaa00",
                    "surface": "#0e0e0e",
                    "secondary-fixed-dim": "#edc600",
                    "surface-container-lowest": "#000000",
                    "tertiary-fixed-dim": "#ec9e00",
                    "secondary-fixed": "#fdd400",
                    "surface-container-high": "#20201f",
                    "surface-dim": "#0e0e0e",
                    "primary-fixed-dim": "#5a90ff",
                    "on-error": "#490006",
                    "on-secondary-fixed": "#433700",
                    "on-primary-container": "#002053",
                    "surface-container-low": "#131313",
                    "outline": "#767575",
                    "secondary-dim": "#edc600",
                    "on-surface-variant": "#adaaaa",
                    "on-tertiary": "#5c3b00",
                    "on-secondary-container": "#fff7e7",
                    "on-primary-fixed-variant": "#002966",
                    "on-tertiary-container": "#503300",
                    "primary-container": "#739eff",
                    "surface-variant": "#262626",
                    "on-primary-fixed": "#000000",
                    "inverse-primary": "#0059cb",
                    "secondary": "#fdd400",
                    "outline-variant": "#484847",
                    "error": "#ff716c",
                    "surface-tint": "#89acff",
                    "on-primary": "#002b6a",
                    "inverse-surface": "#fcf9f8",
                    "surface-container-highest": "#262626",
                    "inverse-on-surface": "#565555",
                    "surface-container": "#1a1a1a",
                    "on-surface": "#ffffff",
                    "primary-dim": "#0f6df3",
                    "on-tertiary-fixed": "#331f00",
                    "primary-fixed": "#739eff",
                    "primary": "#89acff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0e0e0e;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(26, 26, 26, 0.7);
            backdrop-filter: blur(20px);
        }
        .text-neon {
            text-shadow: 0 0 15px rgba(137, 172, 255, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background flex flex-col min-h-screen">
<main class="flex-grow flex items-center justify-center px-6 relative overflow-hidden">
<!-- Background Ambient Accents -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px]"></div>
<!-- Login Container -->
<div class="w-full max-w-md z-10">
<!-- Brand Logo/Header -->
<div class="text-center mb-10">
<h1 class="text-3xl font-extrabold tracking-tighter text-primary text-neon mb-2">
                    ELECTRIC NOIR
                </h1>
<p class="text-on-surface-variant font-label text-[10px] uppercase tracking-[0.2em]">
                    Digital Curator Portal
                </p>
</div>
<!-- Login Card -->
<div class="glass-panel border border-outline-variant/20 rounded-xl p-8 shadow-[0_40px_80px_rgba(0,0,0,0.5)]">
<form class="space-y-6">
<div>
<label class="block text-[11px] font-label uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="email">
                            Email Address
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">alternate_email</span>
</div>
<input class="w-full bg-surface-container-highest border-none focus:ring-1 focus:ring-primary/40 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all font-body text-sm" id="email" placeholder="name@domain.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-[11px] font-label uppercase tracking-widest text-on-surface-variant ml-1" for="password">
                                Password
                            </label>
<a class="text-[10px] font-label uppercase tracking-wider text-primary hover:text-white transition-colors" href="#">
                                Forgot?
                            </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-none focus:ring-1 focus:ring-primary/40 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all font-body text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold py-4 rounded-lg shadow-lg hover:shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                            LOG IN
                            <span class="material-symbols-outlined text-lg">arrow_right_alt</span>
</button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/10 flex flex-col items-center gap-4">
<p class="text-on-surface-variant text-xs">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Aesthetic Footer Note -->
<div class="mt-8 flex justify-center items-center gap-6 opacity-40 grayscale">
<div class="h-[1px] w-12 bg-on-surface-variant"></div>
<span class="material-symbols-outlined text-sm">security</span>
<div class="h-[1px] w-12 bg-on-surface-variant"></div>
</div>
</div>
</main>
<!-- Footer from Shared Components -->
<footer class="w-full py-12 px-6 mt-auto border-t border-[#ffffff]/5 bg-[#000000]">
<div class="flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto">
<div class="mb-6 md:mb-0">
<span class="text-md font-semibold text-[#89acff]">Electric Noir</span>
<p class="text-[#adaaaa] text-sm mt-1 font-['Plus_Jakarta_Sans']">© 2024 Electric Noir. All rights reserved.</p>
</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="text-[#adaaaa] text-sm font-['Plus_Jakarta_Sans'] hover:text-[#ffffff] transition-colors" href="#">Privacy Policy</a>
<a class="text-[#adaaaa] text-sm font-['Plus_Jakarta_Sans'] hover:text-[#ffffff] transition-colors" href="#">Terms of Service</a>
<a class="text-[#adaaaa] text-sm font-['Plus_Jakarta_Sans'] hover:text-[#ffffff] transition-colors" href="#">Shipping Policy</a>
<a class="text-[#adaaaa] text-sm font-['Plus_Jakarta_Sans'] hover:text-[#ffffff] transition-colors" href="#">Returns</a>
</div>
</div>
</footer>
</body></html>
